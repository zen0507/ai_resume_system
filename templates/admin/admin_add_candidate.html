{% extends "admin/base_admin.html" %}
{% block title %}Add Candidate - TALENT MATRIX AI{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Add New Candidate</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">Create a new candidate profile manually.</p>
        </div>
        <a href="{{ url_for('admin_manage_candidates') }}"
            class="text-sm font-medium text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors flex items-center gap-1">
            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
            Back to Candidates
        </a>
    </div>

    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-8">
        <form method="POST" action="{{ url_for('admin_add_candidate') }}" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-semibold text-slate-900 dark:text-slate-100 mb-1.5">Full
                        Name</label>
                    <input type="text" id="name" name="name" required
                        class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all dark:text-white"
                        placeholder="e.g. Jane Doe">
                </div>

                <div>
                    <label for="email"
                        class="block text-sm font-semibold text-slate-900 dark:text-slate-100 mb-1.5">Email
                        Address</label>
                    <input type="email" id="email" name="email" required
                        class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all dark:text-white"
                        placeholder="jane@example.com">
                </div>

                <div>
                    <label for="password"
                        class="block text-sm font-semibold text-slate-900 dark:text-slate-100 mb-1.5">Temporary
                        Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required minlength="6"
                            class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl pl-4 pr-12 py-2.5 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all dark:text-white"
                            placeholder="••••••••">
                        <button type="button"
                            onclick="const p=document.getElementById('password'); const e=document.getElementById('pwd-eye-cand'); if(p.type==='password'){p.type='text';e.textContent='visibility';}else{p.type='password';e.textContent='visibility_off';}"
                            class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 focus:outline-none">
                            <span class="material-symbols-outlined text-[20px]" id="pwd-eye-cand">visibility_off</span>
                        </button>
                    </div>
                    <p class="text-xs text-slate-500 mt-2">The candidate can reset this password later.</p>
                </div>
            </div>

            <div class="pt-4 flex items-center justify-end gap-3 border-t border-slate-100 dark:border-slate-800">
                <a href="{{ url_for('admin_manage_candidates') }}"
                    class="px-5 py-2.5 text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition-colors">Cancel</a>
                <button type="submit"
                    class="px-6 py-2.5 bg-primary hover:bg-primary/90 text-white rounded-xl font-bold shadow-sm shadow-primary/20 hover:shadow-primary/40 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">person_add</span>
                    Create Candidate
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
