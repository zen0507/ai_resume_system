<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}Login{% endblock %} - TALENT MATRIX AI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1337ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101322",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .ai-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.15) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="flex min-h-screen w-full">
        <!-- Left Side: Branding & Illustration (40%) -->
        <div
            class="hidden lg:flex lg:w-[40%] bg-primary dark:bg-[#1a1b24] relative flex-col p-12 overflow-hidden border-r dark:border-slate-800">
            <!-- Background Decorative Elements -->
            <div class="absolute inset-0 ai-pattern opacity-40"></div>
            <div class="absolute -top-24 -left-24 w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-white/5 rounded-full blur-3xl"></div>
            <div class="relative z-10">
                <div class="flex items-center gap-3 text-white">
                    <div class="size-10 bg-white text-primary rounded-lg flex items-center justify-center shadow-lg">
                        <span class="material-symbols-outlined text-3xl font-bold">auto_awesome</span>
                    </div>
                    <h2 class="text-2xl font-black tracking-tight">TALENT MATRIX AI</h2>
                </div>
            </div>
            <div class="relative z-10 mt-48 mb-16 lg:mb-32">
                <h1 class="text-white text-5xl font-black leading-tight tracking-tight mb-6">
                    Hire the best talent,<br />powered by AI.
                </h1>
                <p class="text-white/80 text-lg max-w-md leading-relaxed">
                    Our intelligent platform helps you screen thousands of resumes in seconds with pinpoint accuracy.
                </p>
            </div>


        </div>
        <!-- Right Side: Login Form (60%) -->
        <div
            class="w-full lg:w-[60%] flex items-center justify-center p-6 sm:p-12 md:p-20 bg-background-light dark:bg-background-dark relative">

            <!-- Dark Mode Toggle Button -->
            <button id="theme-toggle" type="button"
                class="absolute top-6 right-6 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 focus:outline-none focus:ring-4 focus:ring-slate-200 dark:focus:ring-slate-700 rounded-lg text-sm p-2.5 transition-colors">
                <span id="theme-toggle-dark-icon" class="material-symbols-outlined hidden">dark_mode</span>
                <span id="theme-toggle-light-icon" class="material-symbols-outlined hidden">light_mode</span>
            </button>
            <script>
                var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
                var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

                // Change the icons inside the button based on previous settings
                if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    themeToggleLightIcon.classList.remove('hidden');
                    document.documentElement.classList.add('dark');
                    document.documentElement.classList.remove('light');
                } else {
                    themeToggleDarkIcon.classList.remove('hidden');
                    document.documentElement.classList.add('light');
                    document.documentElement.classList.remove('dark');
                }

                var themeToggleBtn = document.getElementById('theme-toggle');

                themeToggleBtn.addEventListener('click', function () {
                    // toggle icons inside button
                    themeToggleDarkIcon.classList.toggle('hidden');
                    themeToggleLightIcon.classList.toggle('hidden');

                    // if set via local storage previously
                    if (localStorage.getItem('color-theme')) {
                        if (localStorage.getItem('color-theme') === 'light') {
                            document.documentElement.classList.add('dark');
                            document.documentElement.classList.remove('light');
                            localStorage.setItem('color-theme', 'dark');
                        } else {
                            document.documentElement.classList.remove('dark');
                            document.documentElement.classList.add('light');
                            localStorage.setItem('color-theme', 'light');
                        }

                        // if NOT set via local storage previously
                    } else {
                        if (document.documentElement.classList.contains('dark')) {
                            document.documentElement.classList.remove('dark');
                            document.documentElement.classList.add('light');
                            localStorage.setItem('color-theme', 'light');
                        } else {
                            document.documentElement.classList.add('dark');
                            document.documentElement.classList.remove('light');
                            localStorage.setItem('color-theme', 'dark');
                        }
                    }
                });
            </script>

            <div class="w-full max-w-[480px]">
                <!-- Mobile Logo -->
                <div class="lg:hidden flex items-center gap-2 mb-10">
                    <div class="size-8 bg-primary text-white rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-xl">auto_awesome</span>
                    </div>
                    <h2 class="text-xl font-bold tracking-tight">TALENT MATRIX AI</h2>
                </div>
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>

</html>
